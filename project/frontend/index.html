<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Sentinel - XAUUSD Trading Terminal</title>
<link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;500;700&display=swap" rel="stylesheet"/>
<style>
:root {
  --bg:      #1b1b2b;
  --panel:   #13131f;
  --border:  #25253a;
  --bid:     #4a8fd4;
  --ask:     #c94040;
  --price:   #d0d4e8;
  --gold:    #d4a843;
  --dim:     #44445e;
  --green:   #3da85a;
  --red:     #c94040;
  --text:    #e0e4f8;
  --row-a:   #13131f;
  --row-b:   #111120;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--bg);
  font-family: 'Roboto Mono', monospace;
  color: var(--text);
  height: 100vh;
  overflow: hidden;
  display: flex;
  flex-direction: column;
}
#header {
  background: var(--panel);
  border-bottom: 1px solid var(--border);
  padding: 6px 12px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  height: 40px;
}
.logo { font-size: 16px; font-weight: 700; color: var(--gold); letter-spacing: 2px; }
.price-strip { display: flex; gap: 16px; font-size: 11px; }
.price-item { display: flex; gap: 4px; }
.price-item .sym { color: var(--dim); }
.price-item .val { font-weight: 700; }
.clock { font-size: 11px; color: var(--dim); display: flex; gap: 12px; }
#main {
  flex: 1;
  display: grid;
  grid-template-columns: 280px 1fr 320px;
  grid-template-rows: 1fr 180px;
  gap: 1px;
  background: var(--border);
}
.panel {
  background: var(--bg);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
.panel-header {
  background: var(--panel);
  border-bottom: 1px solid var(--border);
  padding: 6px 10px;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 1px;
  color: var(--gold);
}
.panel-body { flex: 1; overflow: auto; padding: 8px; }
#smc-panel { grid-row: 1 / 2; grid-column: 1 / 2; }
.smc-list { display: flex; flex-direction: column; gap: 6px; }
.smc-item {
  padding: 6px 8px;
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: 4px;
  font-size: 11px;
}
.smc-item .type { font-weight: 700; margin-bottom: 2px; }
.smc-item.resistance .type { color: var(--red); }
.smc-item.support .type { color: var(--green); }
.smc-item .price { font-size: 13px; font-weight: 700; color: var(--price); }
.smc-item .desc { font-size: 9px; color: var(--dim); margin-top: 2px; }
#tv-panel { grid-row: 1 / 2; grid-column: 2 / 3; }
#tv-container { width: 100%; height: 100%; }
#dom-panel { grid-row: 1 / 3; grid-column: 3 / 4; }
#dom-header {
  display: grid;
  grid-template-columns: 1fr auto 1fr;
  gap: 4px;
  padding: 6px 8px;
  background: var(--panel);
  border-bottom: 1px solid var(--border);
  font-size: 10px;
}
#dom-header .side { text-align: center; font-weight: 700; }
#dom-header .side.bid { color: var(--bid); }
#dom-header .side.ask { color: var(--ask); }
#dom-header .spread { text-align: center; color: var(--dim); }
#ladder { flex: 1; overflow: hidden; display: flex; flex-direction: column; }
.row {
  display: grid;
  grid-template-columns: 1fr auto 1fr;
  gap: 4px;
  padding: 2px 4px;
  font-size: 10px;
  position: relative;
}
.row:nth-child(odd) { background: var(--row-a); }
.row:nth-child(even) { background: var(--row-b); }
.row.top-ask { background: rgba(201,64,64,0.3); }
.row.top-bid { background: rgba(74,143,212,0.3); }
.r-ask, .r-bid { position: relative; display: flex; align-items: center; justify-content: flex-end; }
.r-ask { justify-content: flex-start; }
.r-bar { position: absolute; top: 0; bottom: 0; opacity: 0.3; }
.r-ask-bar { right: 0; background: rgba(180,40,40,0.20); }
.r-bid-bar { left: 0; background: rgba(42,90,168,0.20); }
.r-vol { position: relative; z-index: 1; padding: 0 4px; font-size: 9px; }
.r-price { text-align: center; font-weight: 700; color: var(--price); padding: 0 6px; }
#imb-container { display: flex; height: 4px; margin: 4px 8px; border-radius: 2px; overflow: hidden; }
#imb-ask { background: var(--ask); }
#imb-bid { background: var(--bid); }
#dom-footer {
  border-top: 1px solid var(--border);
  padding: 6px 8px;
  font-size: 9px;
  color: var(--dim);
  display: flex;
  justify-content: space-between;
}
#signal-panel { grid-row: 2 / 3; grid-column: 1 / 2; }
.signal-card {
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 12px;
  text-align: center;
}
.signal-badge {
  font-size: 18px;
  font-weight: 700;
  padding: 8px 16px;
  border-radius: 4px;
  display: inline-block;
  margin-bottom: 8px;
}
.signal-badge.buy { background: rgba(61,168,90,0.2); color: var(--green); }
.signal-badge.sell { background: rgba(201,64,64,0.2); color: var(--red); }
.signal-badge.hold { background: rgba(68,68,94,0.3); color: var(--dim); }
.signal-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; font-size: 10px; }
.stat { background: var(--bg); padding: 4px 6px; border-radius: 3px; }
.stat .lbl { color: var(--dim); font-size: 8px; }
.stat .val { font-weight: 700; }
#status-panel { grid-row: 2 / 3; grid-column: 2 / 4; }
.status-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 8px;
  font-size: 10px;
}
.status-item {
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 6px 8px;
}
.status-item .lbl { color: var(--dim); font-size: 8px; margin-bottom: 3px; }
.status-item .val { font-weight: 700; }
.status-item.safe { border-color: var(--green); }
.status-item.warn { border-color: var(--gold); }
.status-item.danger { border-color: var(--red); }
</style>
</head>
<body>
<header id="header">
  <div class="logo">SENTINEL</div>
  <div class="price-strip" id="price-strip"></div>
  <div class="clock">
    <span id="clock-ma">MA --:--</span>
    <span id="clock-ny">NY --:--</span>
  </div>
</header>
<div id="main">
  <section class="panel" id="smc-panel">
    <div class="panel-header">SMC LEVELS (4H)</div>
    <div class="panel-body">
      <div class="smc-list" id="smc-list"><div class="smc-item"><div class="desc">Loading...</div></div></div>
    </div>
  </section>
  <section class="panel" id="tv-panel">
    <div class="panel-header">TRADINGVIEW - XAUUSD 4H</div>
    <div class="panel-body" style="padding:0;"><div id="tv-container"></div></div>
  </section>
  <section class="panel" id="dom-panel">
    <div class="panel-header">DOM LADDER</div>
    <div id="dom-header">
      <div class="side bid">BID</div>
      <div class="spread" id="sprd-display">---.</div>
      <div class="side ask">ASK</div>
    </div>
    <div id="ladder"></div>
    <div id="imb-container"><div id="imb-bid" style="flex:50"></div><div id="imb-ask" style="flex:50"></div></div>
    <div id="dom-footer">
      <span id="msg-count">0 msg</span>
      <span id="last-ts">--:--:--</span>
    </div>
  </section>
  <section class="panel" id="signal-panel">
    <div class="panel-header">ML SIGNAL</div>
    <div class="panel-body">
      <div class="signal-card" id="signal-card">
        <div class="signal-badge hold" id="signal-badge">NO SIGNAL</div>
        <div class="signal-stats">
          <div class="stat"><div class="lbl">WIN PROB</div><div class="val" id="win-prob">--%</div></div>
          <div class="stat"><div class="lbl">PRED Z</div><div class="val" id="pred-z">--</div></div>
          <div class="stat"><div class="lbl">TREND</div><div class="val" id="trend">--</div></div>
          <div class="stat"><div class="lbl">BB%</div><div class="val" id="bb-pct">--</div></div>
        </div>
      </div>
    </div>
  </section>
  <section class="panel" id="status-panel">
    <div class="panel-header">STATUS</div>
    <div class="panel-body">
      <div class="status-grid">
        <div class="status-item" id="status-candle"><div class="lbl">CANDLE</div><div class="val" id="candle-status">--</div></div>
        <div class="status-item" id="status-safe"><div class="lbl">SAFE WINDOW</div><div class="val" id="safe-window">--</div></div>
        <div class="status-item" id="status-range"><div class="lbl">INTRADAY RANGE</div><div class="val" id="intra-range">--</div></div>
        <div class="status-item" id="status-weekly"><div class="lbl">WEEKLY RANGE</div><div class="val" id="weekly-range">--</div></div>
      </div>
    </div>
  </section>
</div>
<script>
"use strict";
const WS_URL = `ws://${location.host}/ws`;
let paused = false, msgCount = 0, lastDOM = null, ws = null;
const $ = id => document.getElementById(id);

function updateClocks() {
  const now = new Date();
  const ma = new Date(now.toLocaleString('en-US', { timeZone: 'Africa/Casablanca' }));
  const ny = new Date(now.toLocaleString('en-US', { timeZone: 'America/New_York' }));
  $('clock-ma').textContent = `MA ${ma.getHours().toString().padStart(2,'0')}:${ma.getMinutes().toString().padStart(2,'0')}`;
  $('clock-ny').textContent = `NY ${ny.getHours().toString().padStart(2,'0')}:${ny.getMinutes().toString().padStart(2,'0')}`;
}
setInterval(updateClocks, 1000); updateClocks();

async function fetchPrices() {
  try {
    const r = await fetch('/prices');
    const d = await r.json();
    const strip = $('price-strip');
    strip.innerHTML = '';
    ['XAU','SPX','NAS','BTC','SILVER','EUR','JPY','OIL'].forEach(sym => {
      const val = d[sym.toLowerCase()] ?? 0;
      const div = document.createElement('div');
      div.className = 'price-item';
      div.innerHTML = `<span class="sym">${sym}</span><span class="val">${val.toFixed(val > 100 ? 2 : 4)}</span>`;
      strip.appendChild(div);
    });
  } catch(e) { console.error('Prices:', e); }
}
setInterval(fetchPrices, 5000); fetchPrices();

async function fetchSMC() {
  try {
    const r = await fetch('/smc');
    const d = await r.json();
    const list = $('smc-list');
    list.innerHTML = '';
    if (!d.levels || d.levels.length === 0) {
      list.innerHTML = '<div class="smc-item"><div class="desc">No levels detected</div></div>';
      return;
    }
    d.levels.forEach(lv => {
      const div = document.createElement('div');
      div.className = `smc-item ${lv.type === 'resistance' ? 'resistance' : 'support'}`;
      div.innerHTML = `<div class="type">${lv.type.toUpperCase()}</div><div class="price">${lv.price.toFixed(2)}</div><div class="desc">${lv.desc || ''}</div>`;
      list.appendChild(div);
    });
  } catch(e) { console.error('SMC:', e); }
}
setInterval(fetchSMC, 10000); fetchSMC();

async function fetchSignal() {
  try {
    const r = await fetch('/signal');
    const d = await r.json();
    const badge = $('signal-badge');
    const sig = d.signal || 'HOLD';
    badge.textContent = sig;
    badge.className = 'signal-badge ' + (sig === 'BUY' ? 'buy' : sig === 'SELL' ? 'sell' : 'hold');
    $('win-prob').textContent = (d.win_prob * 100).toFixed(1) + '%';
    $('pred-z').textContent = d.pred_z?.toFixed(3) ?? '--';
    $('trend').textContent = d.trend ?? '--';
    $('bb-pct').textContent = d.bb_pct?.toFixed(1) ?? '--';
  } catch(e) { console.error('Signal:', e); }
}
setInterval(fetchSignal, 30000); fetchSignal();

async function fetchStatus() {
  try {
    const r = await fetch('/status');
    const d = await r.json();
    $('candle-status').textContent = d.candle_status ?? '--';
    $('status-candle').className = 'status-item ' + (d.candle_safe ? 'safe' : 'warn');
    $('safe-window').textContent = d.safe_window ?? '--';
    $('status-safe').className = 'status-item ' + (d.safe_to_trade ? 'safe' : 'danger');
    $('intra-range').textContent = d.intraday_range ?? '--';
    $('weekly-range').textContent = d.weekly_range ?? '--';
  } catch(e) { console.error('Status:', e); }
}
setInterval(fetchStatus, 10000); fetchStatus();

function connectWS() {
  if (ws && ws.readyState <= 1) return;
  ws = new WebSocket(WS_URL);
  ws.onopen = () => { console.log('DOM connected'); setInterval(() => { if(ws && ws.readyState===1) ws.send('ping'); }, 3000); };
  ws.onclose = () => { console.log('DOM disconnected'); setTimeout(connectWS, 3000); };
  ws.onerror = e => console.error('WS error:', e);
  ws.onmessage = e => {
    let m; try { m = JSON.parse(e.data); } catch { return; }
    if (m.type === 'keepalive') return;
    if (!paused) lastDOM = m;
    msgCount++;
    $('msg-count').textContent = msgCount + ' msg';
  };
}
connectWS();

function renderDOM() {
  requestAnimationFrame(renderDOM);
  if (!lastDOM) return;
  const d = lastDOM; lastDOM = null;
  $('sprd-display').textContent = (parseFloat(d.spread) || 0).toFixed(2);
  const ts = new Date(Number(d.timestamp));
  $('last-ts').textContent = isNaN(ts) ? '--:--:--' : ts.toTimeString().slice(0,8);
  buildLadder(d.dom?.bids ?? [], d.dom?.asks ?? []);
  const totAsk = (d.dom?.asks ?? []).reduce((s,a) => s + (a.volume||0), 0);
  const totBid = (d.dom?.bids ?? []).reduce((s,b) => s + (b.volume||0), 0);
  const tot = totAsk + totBid || 1;
  $('imb-bid').style.flex = (totBid/tot*100).toFixed(1);
  $('imb-ask').style.flex = (totAsk/tot*100).toFixed(1);
}
requestAnimationFrame(renderDOM);

function buildLadder(bids, asks) {
  const sAsks = [...asks].sort((a,b) => a.price - b.price);
  const sBids = [...bids].sort((a,b) => b.price - a.price);
  const bestAsk = sAsks[0]?.price ?? null;
  const bestBid = sBids[0]?.price ?? null;
  const rows = [...[...sAsks].reverse().map(a => ({ price: a.price, vol: a.volume, side: 'ask' })), ...sBids.map(b => ({ price: b.price, vol: b.volume, side: 'bid' }))];
  const maxAsk = sAsks.reduce((m,a) => Math.max(m, a.volume), 0);
  const maxBid = sBids.reduce((m,b) => Math.max(m, b.volume), 0);
  const body = $('ladder');
  while (body.children.length > rows.length) body.lastChild.remove();
  while (body.children.length < rows.length) body.appendChild(makeRow());
  Array.from(body.children).forEach((row, i) => {
    const r = rows[i];
    row.className = 'row' + (bestAsk !== null && r.price === bestAsk ? ' top-ask' : '') + (bestBid !== null && r.price === bestBid ? ' top-bid' : '');
    row.querySelector('.r-price').textContent = r.price.toFixed(2);
    const askVol = row.querySelector('.r-ask-vol'), askBar = row.querySelector('.r-ask-bar');
    const bidVol = row.querySelector('.r-bid-vol'), bidBar = row.querySelector('.r-bid-bar');
    if (r.side === 'ask' && r.vol > 0) {
      const pct = maxAsk > 0 ? ((r.vol / maxAsk) * 100).toFixed(1) : '0';
      askVol.textContent = r.vol.toFixed(2); askBar.style.width = pct + '%';
      bidVol.textContent = ''; bidBar.style.width = '0%';
    } else if (r.side === 'bid' && r.vol > 0) {
      const pct = maxBid > 0 ? ((r.vol / maxBid) * 100).toFixed(1) : '0';
      bidVol.textContent = r.vol.toFixed(2); bidBar.style.width = pct + '%';
      askVol.textContent = ''; askBar.style.width = '0%';
    } else {
      askVol.textContent = ''; askBar.style.width = '0%';
      bidVol.textContent = ''; bidBar.style.width = '0%';
    }
  });
}

function makeRow() {
  const d = document.createElement('div');
  d.className = 'row';
  d.innerHTML = `<div class="r-ask"><div class="r-bar r-ask-bar" style="width:0%"></div><span class="r-vol r-ask-vol"></span></div><div class="r-price">—</div><div class="r-bid"><div class="r-bar r-bid-bar" style="width:0%"></div><span class="r-vol r-bid-vol"></span></div>`;
  return d;
}

function loadTV() {
  const script = document.createElement('script');
  script.src = 'https://s3.tradingview.com/tv.js';
  script.onload = () => {
    new TradingView.widget({
      width: "100%", height: "100%", symbol: "OANDA:XAUUSD", interval: "240",
      timezone: "Etc/UTC", theme: "dark", style: "1", locale: "en",
      toolbar_bg: "#1b1b2b", enable_publishing: false, hide_top_toolbar: true,
      save_image: false, container_id: "tv-container"
    });
  };
  document.head.appendChild(script);
}
loadTV();
</script>
</body>
</html>
