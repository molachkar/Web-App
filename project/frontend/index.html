<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>XAUUSD DOM</title>
<link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;500;700&display=swap" rel="stylesheet"/>
<style>
:root {
  --bg:      #1b1b2b;
  --panel:   #13131f;
  --border:  #25253a;
  --bid:     #4a8fd4;
  --bid-bg:  rgba(42,90,168,0.20);
  --ask:     #c94040;
  --ask-bg:  rgba(180,40,40,0.20);
  --price:   #d0d4e8;
  --gold:    #d4a843;
  --dim:     #44445e;
  --green:   #3da85a;
  --red:     #c94040;
  --row-a:   #13131f;
  --row-b:   #111120;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: transparent;
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  font-family: 'Roboto Mono', monospace;
}

/* ── WIDGET SHELL ─────────────────────────── */
#widget {
  width: 320px;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 6px;
  overflow: hidden;
  box-shadow: 0 8px 40px rgba(0,0,0,0.6);
  display: flex;
  flex-direction: column;
}

/* ── TITLE BAR ────────────────────────────── */
#title-bar {
  background: var(--panel);
  border-bottom: 1px solid var(--border);
  padding: 8px 12px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
#title-bar .left { display: flex; flex-direction: column; gap: 1px; }
#sym  { font-size: 13px; font-weight: 700; color: #e0e4f8; letter-spacing: 1px; }
#sub  { font-size: 9px; color: var(--dim); letter-spacing: 1px; }
#title-bar .right { display: flex; align-items: center; gap: 8px; }
.dot {
  width: 7px; height: 7px; border-radius: 50%;
  background: var(--red);
  box-shadow: 0 0 0 2px rgba(201,64,64,0.2);
  transition: background 0.3s, box-shadow 0.3s;
}
.dot.live {
  background: var(--green);
  box-shadow: 0 0 0 2px rgba(61,168,90,0.25);
  animation: blink 2s infinite;
}
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.4} }
#msg { font-size: 9px; color: var(--dim); }

/* ── BID/ASK/SPREAD ───────────────────────── */
#prices {
  display: grid;
  grid-template-columns: 1fr auto 1fr;
  gap: 0;
  background: var(--panel);
  border-bottom: 1px solid var(--border);
}
.px-block {
  display: flex; flex-direction: column;
  align-items: center;
  padding: 8px 6px;
  gap: 2px;
}
.px-lbl { font-size: 8px; letter-spacing: 2px; color: var(--dim); }
.px-val {
  font-size: 20px; font-weight: 700; line-height: 1;
  transition: color 0.08s;
}
#bid-val { color: var(--bid); }
#ask-val { color: var(--ask); }
#sprd-block {
  display: flex; flex-direction: column; align-items: center;
  justify-content: center; padding: 6px 10px;
  border-left: 1px solid var(--border);
  border-right: 1px solid var(--border);
  gap: 2px;
}
#sprd-val { font-size: 14px; font-weight: 700; color: var(--gold); }

/* ── COL HEADERS ──────────────────────────── */
#col-hdr {
  display: grid;
  grid-template-columns: 1fr 90px 1fr;
  background: #0f0f1c;
  border-bottom: 1px solid var(--border);
  padding: 3px 0;
}
.ch { font-size: 9px; letter-spacing: 2px; padding: 0 8px; }
.ch-ask { color: var(--ask); opacity: 0.7; text-align: right; }
.ch-price { text-align: center; color: var(--dim); }
.ch-bid { color: var(--bid); opacity: 0.7; text-align: left; }

/* ── LADDER ───────────────────────────────── */
#ladder {
  overflow-y: auto;
  max-height: 340px;
  scrollbar-width: thin;
  scrollbar-color: var(--border) transparent;
}

.row {
  display: grid;
  grid-template-columns: 1fr 90px 1fr;
  height: 24px;
  align-items: center;
  border-bottom: 1px solid rgba(255,255,255,0.02);
  position: relative;
}
.row:nth-child(even) { background: var(--row-a); }
.row:nth-child(odd)  { background: var(--row-b); }
.row:hover { filter: brightness(1.4); }
.row.top-ask { background: rgba(180,40,40,0.10) !important; }
.row.top-bid { background: rgba(42,90,168,0.10) !important; }

/* price */
.r-price {
  text-align: center; font-size: 12px; font-weight: 500;
  color: var(--price); z-index: 2; position: relative;
}
.row.top-ask .r-price { color: var(--ask); font-weight: 700; }
.row.top-bid .r-price { color: var(--bid); font-weight: 700; }

/* ask cell — vol right-aligned, bar from right */
.r-ask {
  position: relative; height: 100%;
  display: flex; align-items: center;
  justify-content: flex-end;
  padding-right: 8px; overflow: hidden;
}
.r-ask-bar {
  position: absolute; right: 0; top: 0; bottom: 0;
  background: var(--ask-bg);
  border-left: 2px solid var(--ask);
  transition: width 0.1s;
}
.r-ask-vol {
  position: relative; z-index: 2;
  color: var(--ask); font-size: 11px; font-weight: 500;
}

/* bid cell — vol left-aligned, bar from left */
.r-bid {
  position: relative; height: 100%;
  display: flex; align-items: center;
  justify-content: flex-start;
  padding-left: 8px; overflow: hidden;
}
.r-bid-bar {
  position: absolute; left: 0; top: 0; bottom: 0;
  background: var(--bid-bg);
  border-right: 2px solid var(--bid);
  transition: width 0.1s;
}
.r-bid-vol {
  position: relative; z-index: 2;
  color: var(--bid); font-size: 11px; font-weight: 500;
}

/* flash */
@keyframes fa { 0%,100%{background:transparent} 50%{background:rgba(74,143,212,0.2)} }
@keyframes fb { 0%,100%{background:transparent} 50%{background:rgba(201,64,64,0.2)} }
.flash-b { animation: fa 0.18s ease; }
.flash-a { animation: fb 0.18s ease; }

/* ── IMBALANCE ────────────────────────────── */
#imb {
  display: flex; height: 14px; overflow: hidden;
  border-top: 1px solid var(--border);
  flex-shrink: 0;
}
#imb-ask { background: linear-gradient(90deg, transparent, rgba(201,64,64,0.4)); transition: flex 0.3s; }
#imb-sep { width: 1px; background: var(--border); flex-shrink: 0; }
#imb-bid { background: linear-gradient(90deg, rgba(74,143,212,0.4), transparent); transition: flex 0.3s; }

/* ── FOOTER ───────────────────────────────── */
#footer {
  background: var(--panel);
  border-top: 1px solid var(--border);
  padding: 5px 10px;
  display: flex; align-items: center; justify-content: space-between;
  flex-shrink: 0;
}
#ts { font-size: 9px; color: var(--dim); }
.btns { display: flex; gap: 5px; }
.btns button {
  background: #1a1a2e; border: 1px solid var(--border);
  color: var(--dim); font-family: 'Roboto Mono', monospace;
  font-size: 9px; padding: 2px 8px; cursor: pointer; border-radius: 2px;
  transition: border-color 0.15s, color 0.15s;
}
.btns button:hover  { border-color: var(--gold); color: var(--gold); }
.btns button.active { border-color: var(--ask);  color: var(--ask); }
</style>
</head>
<body>
<div id="widget">

  <!-- title -->
  <div id="title-bar">
    <div class="left">
      <span id="sym">XAUUSD</span>
      <span id="sub">Gold vs US Dollar</span>
    </div>
    <div class="right">
      <span id="msg">0 msg</span>
      <div class="dot" id="dot"></div>
    </div>
  </div>

  <!-- prices -->
  <div id="prices">
    <div class="px-block">
      <div class="px-lbl">BID</div>
      <div class="px-val" id="bid-val">——.——</div>
    </div>
    <div id="sprd-block">
      <div class="px-lbl">SPREAD</div>
      <div id="sprd-val">—</div>
    </div>
    <div class="px-block">
      <div class="px-lbl">ASK</div>
      <div class="px-val" id="ask-val">——.——</div>
    </div>
  </div>

  <!-- col headers -->
  <div id="col-hdr">
    <div class="ch ch-ask">Volume</div>
    <div class="ch ch-price">Price</div>
    <div class="ch ch-bid">Volume</div>
  </div>

  <!-- ladder -->
  <div id="ladder"></div>

  <!-- imbalance -->
  <div id="imb">
    <div id="imb-ask" style="flex:1"></div>
    <div id="imb-sep"></div>
    <div id="imb-bid" style="flex:1"></div>
  </div>

  <!-- footer -->
  <div id="footer">
    <span id="ts">—</span>
    <div class="btns">
      <button id="btn-pause">⏸ PAUSE</button>
      <button id="btn-clear">⌫ CLEAR</button>
    </div>
  </div>

</div>
<script>
"use strict";
const WS_URL = `ws://${location.host}/ws`;

let paused   = false;
let msgCount = 0;
let lastData = null;
let prevBid  = null;
let pingTs   = 0;
let ws       = null;

const $  = id => document.getElementById(id);
const el = {
  dot:    $('dot'),
  msg:    $('msg'),
  bid:    $('bid-val'),
  ask:    $('ask-val'),
  sprd:   $('sprd-val'),
  ladder: $('ladder'),
  imbA:   $('imb-ask'),
  imbB:   $('imb-bid'),
  ts:     $('ts'),
};

// ── WS ──────────────────────────────────────────
function connect() {
  if (ws && ws.readyState <= 1) return;
  ws = new WebSocket(WS_URL);
  ws.binaryType = 'arraybuffer';

  ws.onopen = () => {
    el.dot.className = 'dot live';
    ping();
  };
  ws.onclose = () => {
    el.dot.className = 'dot';
    ws = null;
    setTimeout(connect, 3000);
  };
  ws.onerror = () => ws && ws.close();
  ws.onmessage = e => {
    const raw = e.data instanceof ArrayBuffer
      ? new TextDecoder().decode(e.data) : e.data;
    let m; try { m = JSON.parse(raw); } catch { return; }
    if (m.type === 'keepalive') return;
    if (!paused) { lastData = m; }
    msgCount++;
    el.msg.textContent = msgCount + ' msg';
  };
}

function ping() {
  if (!ws || ws.readyState !== 1) return;
  pingTs = performance.now();
  ws.send('ping');
  setTimeout(ping, 3000);
}

connect();

// ── RENDER ──────────────────────────────────────
function render() {
  requestAnimationFrame(render);
  if (!lastData) return;
  const d = lastData; lastData = null;

  const bid  = parseFloat(d.bid)    || 0;
  const ask  = parseFloat(d.ask)    || 0;
  const sprd = parseFloat(d.spread) || 0;

  // flash on change
  if (prevBid !== null && bid !== prevBid) {
    const c = bid > prevBid ? 'flash-b' : 'flash-a';
    el.bid.classList.add(c); el.ask.classList.add(c);
    setTimeout(() => { el.bid.classList.remove(c); el.ask.classList.remove(c); }, 180);
  }
  prevBid = bid;

  el.bid.textContent  = bid.toFixed(2);
  el.ask.textContent  = ask.toFixed(2);
  el.sprd.textContent = sprd.toFixed(2);

  const ts = new Date(Number(d.timestamp));
  el.ts.textContent = isNaN(ts) ? '' : ts.toISOString().replace('T',' ').slice(0,19) + ' UTC';

  buildLadder(d.dom?.bids ?? [], d.dom?.asks ?? []);
}
requestAnimationFrame(render);

// ── LADDER ──────────────────────────────────────
function buildLadder(bids, asks) {
  // sort: asks low→high (best ask = index 0), bids high→low (best bid = index 0)
  const sAsks = [...asks].sort((a,b) => a.price - b.price);
  const sBids = [...bids].sort((a,b) => b.price - a.price);

  const bestAsk = sAsks[0]?.price ?? null;
  const bestBid = sBids[0]?.price ?? null;

  // display: highest asks on top, then bids below
  const rows = [
    ...[...sAsks].reverse().map(a => ({ price: a.price, vol: a.volume, side: 'ask' })),
    ...sBids.map(b => ({ price: b.price, vol: b.volume, side: 'bid' })),
  ];

  // scale bars per side independently (real volumes, no hardcoding)
  const maxAsk = sAsks.reduce((m,a) => Math.max(m, a.volume), 0);
  const maxBid = sBids.reduce((m,b) => Math.max(m, b.volume), 0);

  // sync DOM rows
  const body = el.ladder;
  while (body.children.length > rows.length) body.lastChild.remove();
  while (body.children.length < rows.length) body.appendChild(makeRow());

  Array.from(body.children).forEach((row, i) => {
    const r = rows[i];
    const isTopAsk = bestAsk !== null && r.price === bestAsk;
    const isTopBid = bestBid !== null && r.price === bestBid;

    row.className = 'row' +
      (isTopAsk ? ' top-ask' : '') +
      (isTopBid ? ' top-bid' : '');

    row.querySelector('.r-price').textContent = r.price.toFixed(2);

    const askVol = row.querySelector('.r-ask-vol');
    const askBar = row.querySelector('.r-ask-bar');
    const bidVol = row.querySelector('.r-bid-vol');
    const bidBar = row.querySelector('.r-bid-bar');

    if (r.side === 'ask' && r.vol > 0) {
      const pct = maxAsk > 0 ? ((r.vol / maxAsk) * 100).toFixed(1) : '0';
      askVol.textContent = r.vol.toFixed(2);
      askBar.style.width = pct + '%';
      bidVol.textContent = '';
      bidBar.style.width = '0%';
    } else if (r.side === 'bid' && r.vol > 0) {
      const pct = maxBid > 0 ? ((r.vol / maxBid) * 100).toFixed(1) : '0';
      bidVol.textContent = r.vol.toFixed(2);
      bidBar.style.width = pct + '%';
      askVol.textContent = '';
      askBar.style.width = '0%';
    } else {
      // no volume at this level — show price, no bars
      askVol.textContent = '';
      askBar.style.width = '0%';
      bidVol.textContent = '';
      bidBar.style.width = '0%';
    }
  });

  // imbalance
  const totAsk = asks.reduce((s,a) => s + a.volume, 0);
  const totBid = bids.reduce((s,b) => s + b.volume, 0);
  const tot    = totAsk + totBid || 1;
  el.imbA.style.flex = (totAsk / tot * 100).toFixed(1);
  el.imbB.style.flex = (totBid / tot * 100).toFixed(1);
}

function makeRow() {
  const d = document.createElement('div');
  d.className = 'row';
  d.innerHTML = `
    <div class="r-ask">
      <div class="r-ask-bar" style="width:0%"></div>
      <span class="r-ask-vol"></span>
    </div>
    <div class="r-price">—</div>
    <div class="r-bid">
      <div class="r-bid-bar" style="width:0%"></div>
      <span class="r-bid-vol"></span>
    </div>`;
  return d;
}

// ── CONTROLS ────────────────────────────────────
$('btn-pause').addEventListener('click', () => {
  paused = !paused;
  $('btn-pause').textContent = paused ? '▶ RESUME' : '⏸ PAUSE';
  $('btn-pause').classList.toggle('active', paused);
});
$('btn-clear').addEventListener('click', () => {
  el.ladder.innerHTML = '';
  msgCount = 0;
  el.msg.textContent = '0 msg';
});
</script>
</body>
</html>
